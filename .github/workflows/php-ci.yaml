name: PHP CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: Verify PHP is available
        run: php --version
      - run: cargo build --release -p modern-colorthief-php
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Verify shared library exists
        run: |
          if [ -f target/release/libmodern_colorthief.so ]; then
            echo "Found .so file"
          elif [ -f target/release/modern_colorthief_php.dll ]; then
            echo "Found .dll file"
          else
            echo "No shared library found"
            ls -la target/release/ | grep -i colorthief || true
            exit 1
          fi
