name: Ruby CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-cpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/
          retention-days: 1
          if-no-files-found: error

  gpu-build:
    name: "gpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.304.1
          cache: true

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-gpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/
          retention-days: 1
          if-no-files-found: error

  cpu-test:
    name: "cpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-cpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Run Rust tests
        working-directory: crates/ruby-bindings/ext
        run: cargo test

  cpu-rspec:
    name: "cpu-rspec — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-cpu-rspec

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Install dependencies
        working-directory: crates/ruby-bindings
        run: bundle install

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings
        run: bundle exec rspec spec/

  gpu-test:
    name: "gpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.304.1
          cache: true

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-gpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/

      - name: Run Rust tests
        working-directory: crates/ruby-bindings-gpu/ext
        run: cargo test

  gpu-rspec:
    name: "gpu-rspec — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.304.1
          cache: true

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-gpu-rspec

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/

      - name: Install dependencies
        working-directory: crates/ruby-bindings-gpu
        run: bundle install

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings-gpu
        run: bundle exec rspec spec/

  cross-gem:
    name: "cross-gem ${{ matrix.bindings }}"
    runs-on: ubuntu-latest
    needs: [cpu-test, cpu-rspec, gpu-test, gpu-rspec]
    if: always() && (needs.cpu-test.result == 'success' || needs.cpu-test.result == 'skipped') && (needs.cpu-rspec.result == 'success' || needs.cpu-rspec.result == 'skipped') && (needs.gpu-test.result == 'success' || needs.gpu-test.result == 'skipped') && (needs.gpu-rspec.result == 'success' || needs.gpu-rspec.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true
          working-directory: crates/${{ matrix.bindings }}

      - name: Set up Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-cross
          bundler-cache: false

      - name: Cross-compile gem
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake cross-native gem

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.bindings }}-gems"
          path: crates/${{ matrix.bindings }}/pkg/*.gem
          retention-days: 7

  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ matrix.bindings }}-gems"
          path: gems/
          merge-multiple: true

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: |
          for gem in gems/*.gem; do
            gem push "$gem"
          done
