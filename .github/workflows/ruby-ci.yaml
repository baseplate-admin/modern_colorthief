name: Ruby CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/core_cpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/core_cpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/
          retention-days: 1
          if-no-files-found: error

  cpu-test:
    name: "cpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Run Rust tests
        working-directory: crates/ruby-bindings/ext
        run: cargo test

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rspec spec/

  cross-gem-cpu:
    name: cross-gem-cpu
    runs-on: ubuntu-latest
    needs: [cpu-test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true

      - name: Cross-compile CPU gem
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake native

      - name: Upload CPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gems
          path: crates/ruby-bindings/pkg/*.gem
          retention-days: 7

  publish-cpu:
    name: Publish CPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem-cpu]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem
