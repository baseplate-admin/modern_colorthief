  android:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: aarch64-linux-android
          - runner: ubuntu-latest
            target: x86_64-linux-android
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-android-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/python-bindings/Cargo.toml --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: [linux]
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: crates/python-bindings/dist
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Rust CPU tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
        working-directory: .
      - run: |
          WHEEL=$(ls dist/*.whl)
          uv pip install --system "$WHEEL" pytest
      - run: pytest tests/ -v

  gpu-test:
    name: GPU Python tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [linux]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    defaults:
      run:
        working-directory: crates/python-bindings-gpu
    env:
      VULKAN_VERSION: 1.4.304.1
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install build tools
        run: |
          uv venv .venv
          uv pip install maturin pytest Pillow
      - name: Build GPU Python module
        run: uv run maturin develop --release
      - name: Run Rust GPU tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu
        working-directory: .
      - name: Run GPU Python tests
        run: uv run pytest tests/ -v

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, android, sdist, test, gpu-test]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v8.2.0
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            wasm-wheels/*.whl
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
