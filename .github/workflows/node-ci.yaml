name: Node CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build node bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: crates/node-bindings
        run: npm install && npx napi build --platform --release --output-dir artifacts
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - uses: actions/upload-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts/*.node
      - uses: actions/upload-artifact@v4
        with:
          name: node-native-js
          path: crates/node-bindings/native.js

  node-test:
    name: Node.js 22
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: node-native-js
          path: crates/node-bindings
      - working-directory: crates/node-bindings
        run: npm install && npx vitest run

  deno-test:
    name: Deno
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: node-native-js
          path: crates/node-bindings
      - working-directory: crates/node-bindings
        run: npm install
      - working-directory: crates/node-bindings
        run: deno test --allow-read --allow-env --allow-net --include="test_" tests/

  bun-test:
    name: Bun
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: node-native-js
          path: crates/node-bindings
      - working-directory: crates/node-bindings
        run: npm install
      - working-directory: crates/node-bindings
        run: bun test -- --match="*" tests/test_*.ts

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [node-test, deno-test, bun-test, build]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: node-native-js
          path: crates/node-bindings
      - working-directory: crates/node-bindings
        run: npm install
      - working-directory: crates/node-bindings
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
