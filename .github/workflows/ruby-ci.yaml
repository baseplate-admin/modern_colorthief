name: Ruby CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

# https://github.com/oxidize-rb/actions

jobs:
  ruby-cpu-build:
    name: Ruby CPU build + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: crates/ruby-bindings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@main
        with:
          ruby-version: "3.4"
          bundler-cache: false
          cargo-cache: true
          cargo-vendor: true
          cache-version: v0-cpu
          working-directory: crates/ruby-bindings

      - name: Build native extension
        run: rake build

      - name: Run RSpec tests
        run: |
          bundle install
          bundle exec rspec spec/

      - name: Cross-compile with cross-gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: x86_64-linux
          ruby-versions: "3.4"
          working-directory: crates/ruby-bindings

  ruby-gpu-build:
    name: Ruby GPU build + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: crates/ruby-bindings-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@main
        with:
          ruby-version: "3.4"
          bundler-cache: false
          cargo-cache: true
          cargo-vendor: true
          cache-version: v0-gpu
          working-directory: crates/ruby-bindings-gpu

      - name: Build native extension
        run: rake build

      - name: Run RSpec tests
        run: |
          bundle install
          bundle exec rspec spec/

      - name: Cross-compile with cross-gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: x86_64-linux
          ruby-versions: "3.4"
          working-directory: crates/ruby-bindings-gpu
