name: Diagnostic PHP Build

on:
  push:
    branches: [add-wasm]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: Build and capture output
        id: build
        run: |
          OUTPUT=$(cargo build --release -p modern-colorthief-php 2>&1)
          RC=$?
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/php.log
          echo "$OUTPUT"
        continue-on-error: true
      - name: Report error as annotations
        if: always()
        run: |
          echo "::error::PHP build exit code: ${{ steps.build.outputs.exit_code }}"
          head -50 /tmp/php.log | while IFS= read -r line; do
            echo "::error title=PHP build::$line"
          done
