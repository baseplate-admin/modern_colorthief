name: PHP CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: Verify PHP is available
        run: php --version
      - run: cargo build --release -p modern-colorthief-php
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: test -f target/release/libmodern_colorthief.so
      - name: Install PHP dependencies
        working-directory: crates/php-bindings
        run: composer install
      - name: Run PHP pest tests
        working-directory: crates/php-bindings
        run: |
          php -d extension=../../target/release/libmodern_colorthief.so vendor/bin/pest
