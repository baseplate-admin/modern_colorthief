name: JVM CI

on:
  push:
    branches: [ main, master, add-wasm ]
    tags: [ '*' ]
    paths:
      - 'crates/jvm-bindings/**'
      - 'crates/jvm-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/jvm-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/jvm-bindings/**'
      - 'crates/jvm-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/jvm-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - name: Build JVM native library (PGO)
        run: cargo pgo optimize -- --release --target x86_64-unknown-linux-gnu -p modern-colorthief-jvm
      - name: Run Rust core unit tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Verify shared library built
        run: test -f target/x86_64-unknown-linux-gnu/release/libmodern_colorthief.so
      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-cpu
          path: target/x86_64-unknown-linux-gnu/release/libmodern_colorthief.so
          retention-days: 1

  cpu-junit:
    name: "cpu-junit"
    needs: [cpu-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-lib-cpu
          path: crates/jvm-bindings/tests/native
      - name: Verify native library
        run: test -f crates/jvm-bindings/tests/native/libmodern_colorthief.so
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.1'
      - name: Generate Gradle wrapper
        working-directory: crates/jvm-bindings/tests
        run: gradle wrapper
      - name: Run JUnit tests
        working-directory: crates/jvm-bindings/tests
        run: ./gradlew test --info

  gpu-build:
    name: "gpu-build — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu --target ${{ matrix.target }}
      - name: Build GPU native library (PGO)
        run: cargo pgo optimize -- --release --target ${{ matrix.target }} -p modern-colorthief-jvm-gpu
      - name: Verify shared library (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: test -f target/x86_64-unknown-linux-gnu/release/libmodern_colorthief_gpu.so
      - name: Verify shared library (macOS)
        if: startsWith(matrix.os, 'macos')
        run: test -f target/x86_64-apple-darwin/release/libmodern_colorthief_gpu.dylib
      - name: Verify shared library (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Test-Path target\x86_64-pc-windows-msvc\release\modern_colorthief_gpu.dll
      - name: Upload GPU native library (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: "native-lib-gpu-${{ matrix.os }}"
          path: target/x86_64-unknown-linux-gnu/release/libmodern_colorthief_gpu.so
          retention-days: 1
      - name: Upload GPU native library (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: "native-lib-gpu-${{ matrix.os }}"
          path: target/x86_64-apple-darwin/release/libmodern_colorthief_gpu.dylib
          retention-days: 1
      - name: Upload GPU native library (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: "native-lib-gpu-${{ matrix.os }}"
          path: target/x86_64-pc-windows-msvc/release/modern_colorthief_gpu.dll
          retention-days: 1

  gpu-rust-test:
    name: "gpu-rust-test — ${{ matrix.os }}"
    needs: [gpu-build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Run Rust GPU unit tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu -- --target ${{ matrix.target }}

  gpu-junit:
    name: "gpu-junit — ${{ matrix.os }}"
    needs: [gpu-build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Download GPU native library
        uses: actions/download-artifact@v4
        with:
          name: "native-lib-gpu-${{ matrix.os }}"
          path: crates/jvm-bindings-gpu/tests/native
      - name: Verify native library (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: test -f crates/jvm-bindings-gpu/tests/native/libmodern_colorthief_gpu.so
      - name: Verify native library (macOS)
        if: startsWith(matrix.os, 'macos')
        run: test -f crates/jvm-bindings-gpu/tests/native/libmodern_colorthief_gpu.dylib
      - name: Verify native library (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Test-Path crates/jvm-bindings-gpu/tests/native/modern_colorthief_gpu.dll

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.1'
      - name: Generate Gradle wrapper
        working-directory: crates/jvm-bindings-gpu/tests
        run: gradle wrapper
      - name: Run GPU JUnit tests
        working-directory: crates/jvm-bindings-gpu/tests
        run: ./gradlew test --info

  android-check:
    name: Android check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: cargo check --target aarch64-linux-android -p modern-colorthief-core -p modern-colorthief-core-cpu
