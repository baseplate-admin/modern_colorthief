name: Release

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    outputs:
      ci-ok: ${{ steps.check-ci.outputs.ci-ok }}
    steps:
      - name: Check if all CI jobs passed for this commit
        id: check-ci
        uses: actions/github-script@v7
        with:
          script: |
            const maxWait = 20 * 60 * 1000;
            const interval = 30 * 1000;
            const start = Date.now();

            while (Date.now() - start < maxWait) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
              });

              const allCompleted = checks.data.check_runs.every(
                run => run.status === 'completed'
              );

              if (!allCompleted) {
                await new Promise(r => setTimeout(r, interval));
                continue;
              }

              const anyFailed = checks.data.check_runs.some(
                run => run.conclusion !== 'success' && run.conclusion !== 'skipped' && run.conclusion !== 'neutral'
              );

              const statuses = await github.rest.repos.getCombinedCommitStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
              });

              const statusFailed = statuses.data.statuses.some(
                s => s.state !== 'success' && s.state !== 'skipped' && s.state !== 'neutral'
              );

              if (!anyFailed && !statusFailed) {
                core.setOutput('ci-ok', 'true');
                console.log('All CI checks passed');
                return;
              }

              if (anyFailed) {
                const failures = checks.data.check_runs
                  .filter(r => r.conclusion && !['success','skipped','neutral'].includes(r.conclusion))
                  .map(r => `${r.name}: ${r.conclusion}`);
                core.setFailed(`CI checks failed: ${failures.join(', ')}`);
                return;
              }

              if (statusFailed) {
                const failures = statuses.data.statuses
                  .filter(s => !['success','skipped','neutral'].includes(s.state))
                  .map(s => `${s.context}: ${s.state}`);
                core.setFailed(`Commit statuses failed: ${failures.join(', ')}`);
                return;
              }

              await new Promise(r => setTimeout(r, interval));
            }

            core.setFailed('Timeout waiting for CI to complete');

  release:
    name: Semantic Release
    needs: wait-for-ci
    if: needs.wait-for-ci.outputs.ci-ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "modern_colorthief-release"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run semantic-release
        run: uv tool run python-semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
