name: WASM CI

on:
  push:
    branches: [ main, master, wasm-fix ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-wasm -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-core-wasm -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - run: ls -lh target/wasm32-unknown-unknown/release/*.wasm

  wasm-gpu-build:
    name: WASM GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-wasm -p modern-colorthief-wasm-gpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-core-wasm -p modern-colorthief-wasm-gpu

  gpu-node-tests:
    name: GPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-gpu-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vulkan SDK + Lavapipe
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_lavapipe: true
      - name: Install node-webgpu (Dawn) + deps
        working-directory: crates/wasm-bindings-gpu
        run: npm ci
      - name: Verify webgpu module loads
        working-directory: crates/wasm-bindings-gpu
        run: node test-webgpu-setup.cjs && echo "WebGPU OK"
      - name: Run GPU Node.js tests
        working-directory: crates/wasm-bindings-gpu
        run: wasm-pack test --node --release

  cpu-chrome-tests:
    name: CPU Chrome tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked
      - uses: nanasess/setup-chromedriver@v3
      - uses: browser-actions/setup-geckodriver@latest
      - name: Run Chrome tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --headless --chrome --release -- --features browser-tests

  cpu-firefox-tests:
    name: CPU Firefox tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked
      - uses: nanasess/setup-chromedriver@v3
      - uses: browser-actions/setup-geckodriver@latest
      - name: Run Firefox tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --headless --firefox --release -- --features browser-tests

  cpu-node-tests:
    name: CPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo install wasm-pack --locked
      - name: Run Node tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --node --release
