name: Ruby CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ########################################################################
  # 1. Build native extensions (CPU + GPU)
  ########################################################################
  native-build:
    name: "build ${{ matrix.bindings }} — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK (Linux / GPU)
        if: runner.os == 'Linux' && matrix.bindings == 'ruby-bindings-gpu'
        uses: justinkb/setup-vulkan-sdk@v1

      - name: Set up MoltenVK (macOS / GPU)
        if: runner.os == 'macOS' && matrix.bindings == 'ruby-bindings-gpu'
        run: |
          brew install molten-vk
          export VK_ICD_FILENAMES=/usr/local/opt/molten-vk/share/vulkan/icd.d/MoltenVK_IC.json

      - name: Set up Vulkan SDK (Windows / GPU)
        if: runner.os == 'Windows' && matrix.bindings == 'ruby-bindings-gpu'
        uses: humbletim/setup-vulkan-sdk@v1
        with:
          vulkan-version-windows: latest

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-build

      - name: Build native extension
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-${{ matrix.bindings }}-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/${{ matrix.bindings }}/lib/
          retention-days: 1
          if-no-files-found: error

  ########################################################################
  # 2. Run Rust tests + RSpec tests (CPU + GPU)
  ########################################################################
  native-test:
    name: "test ${{ matrix.bindings }} — ${{ matrix.os }} / ruby ${{ matrix.ruby }} / ${{ matrix.test-type }}"
    runs-on: ${{ matrix.os }}
    needs: [native-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
        bindings: [ruby-bindings, ruby-bindings-gpu]
        test-type: [rust, rspec]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK (Linux / GPU)
        if: runner.os == 'Linux' && matrix.bindings == 'ruby-bindings-gpu'
        uses: justinkb/setup-vulkan-sdk@v1

      - name: Set up MoltenVK (macOS / GPU)
        if: runner.os == 'macOS' && matrix.bindings == 'ruby-bindings-gpu'
        run: |
          brew install molten-vk
          export VK_ICD_FILENAMES=/usr/local/opt/molten-vk/share/vulkan/icd.d/MoltenVK_IC.json

      - name: Set up Vulkan SDK (Windows / GPU)
        if: runner.os == 'Windows' && matrix.bindings == 'ruby-bindings-gpu'
        uses: humbletim/setup-vulkan-sdk@v1
        with:
          vulkan-version-windows: latest

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-${{ matrix.bindings }}-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/${{ matrix.bindings }}/lib/

      - name: Install dependencies
        working-directory: crates/${{ matrix.bindings }}
        run: bundle install

      - name: Run Rust tests
        if: matrix.test-type == 'rust'
        working-directory: crates/${{ matrix.bindings }}/ext
        run: cargo test

      - name: Run RSpec tests
        if: matrix.test-type == 'rspec'
        working-directory: crates/${{ matrix.bindings }}
        run: bundle exec rspec spec/

  ########################################################################
  # 3. Cross-compile gems for all platforms
  ########################################################################
  cross-gem:
    name: "cross-gem ${{ matrix.bindings }}"
    runs-on: ubuntu-latest
    needs: [native-test]
    if: needs.native-test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true
          working-directory: crates/${{ matrix.bindings }}

      - name: Set up Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-cross
          bundler-cache: false

      - name: Cross-compile gem
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake cross-native gem

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.bindings }}-gems"
          path: crates/${{ matrix.bindings }}/pkg/*.gem
          retention-days: 7

  ########################################################################
  # 4. Publish gems to RubyGems on tagged releases
  ########################################################################
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ matrix.bindings }}-gems"
          path: gems/
          merge-multiple: true

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: |
          for gem in gems/*.gem; do
            gem push "$gem"
          done
