name: Ruby CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-build:
    name: Ruby build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Ruby bindings
        id: build
        run: |
          OUTPUT=$(cargo build --release -p modern-colorthief-ruby 2>&1)
          RC=$?
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/ruby.log
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then exit 1; fi
        continue-on-error: true
      - name: Show build error
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "::error::Ruby build failed with exit code ${{ steps.build.outputs.exit_code }}"
          head -100 /tmp/ruby.log | while IFS= read -r line; do echo "::error title=Ruby build::$line"; done
          exit 1
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: test -f target/release/libmodern_colorthief.so
      - working-directory: crates/ruby-bindings
        run: |
          bundle install --path vendor/bundle
          RUBYLIB=../../target/release:$RUBYLIB bundle exec rspec spec/

  ruby-gpu-build:
    name: Ruby GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Ruby GPU bindings
        id: build
        run: |
          OUTPUT=$(cargo build --release -p modern-colorthief-ruby-gpu 2>&1)
          RC=$?
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/ruby_gpu.log
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then exit 1; fi
        continue-on-error: true
      - name: Show build error
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "::error::Ruby GPU build failed with exit code ${{ steps.build.outputs.exit_code }}"
          head -100 /tmp/ruby_gpu.log | while IFS= read -r line; do echo "::error title=Ruby GPU build::$line"; done
          exit 1
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: test -f target/release/libmodern_colorthief_gpu.so
      - working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install --path vendor/bundle
          RUBYLIB=../../target/release:$RUBYLIB bundle exec rspec spec/
