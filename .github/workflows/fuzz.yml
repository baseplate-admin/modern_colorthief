name: Fuzz Tests

on:
  push:
    branches: [main, master, add-wasm]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  # ============================================================
  # Property-based fuzz tests (cargo test) with PGO
  # ============================================================
  fuzz-test:
    name: "fuzz — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + software renderers (macOS)
        if: matrix.os == 'macos-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-fuzz-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-fuzz-cargo-registry-

      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-fuzz --target ${{ matrix.target }} -- --test-threads=1

      - name: Run fuzz property tests (PGO)
        env:
          RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
        run: cargo test -p modern-colorthief-fuzz --target ${{ matrix.target }} -- --test-threads=1

  # ============================================================
  # Actual fuzzing with libfuzzer (cargo fuzz) on Linux
  # ============================================================
  fuzz-run:
    name: "fuzz run — ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [palette_extract, color_extract, cpu_gpu_consistency]

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-fuzz-run-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-fuzz-run-cargo-registry-

      - name: Run fuzz target
        run: |
          cd crates/fuzz
          cargo fuzz build ${{ matrix.target }} --sanitizer none
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=30 -max_len=65536

  # ============================================================
  # Core CPU unit tests with PGO
  # ============================================================
  fuzz-core-cpu:
    name: "fuzz core_cpu unit tests — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-fuzz-cpu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-fuzz-cpu-cargo-registry-

      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target ${{ matrix.target }}

      - name: Run core_cpu tests (PGO)
        env:
          RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu --target ${{ matrix.target }}

  # ============================================================
  # Core GPU unit tests with SwiftShader
  # ============================================================
  fuzz-core-gpu:
    name: "fuzz core_gpu unit tests — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          }

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + software renderers (macOS)
        if: matrix.os == 'macos-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core-gpu --target ${{ matrix.target }}

      - name: Run core_gpu tests (PGO)
        env:
          RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
        run: cargo test -p modern-colorthief-core-gpu --target ${{ matrix.target }}
