name: Ruby GPU CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-gpu.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-gpu.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ########################################################################
  # 1. Build native GPU extension
  ########################################################################
  native-build:
    name: "build gpu ${{ matrix.bindings }} — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["3.2", "3.3", "3.4"]
        bindings: [ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1
        with:
          version: latest

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-gpu-build

      - name: Build native extension
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-${{ matrix.bindings }}-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/${{ matrix.bindings }}/lib/
          retention-days: 1
          if-no-files-found: error

  ########################################################################
  # 2. Run Rust tests + RSpec tests in parallel
  ########################################################################
  native-test:
    name: "test gpu ${{ matrix.bindings }} — ${{ matrix.os }} / ruby ${{ matrix.ruby }} / ${{ matrix.test-type }}"
    runs-on: ${{ matrix.os }}
    needs: [native-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["3.2", "3.3", "3.4"]
        bindings: [ruby-bindings-gpu]
        test-type: [rust, rspec]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1
        with:
          version: latest

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-gpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-${{ matrix.bindings }}-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/${{ matrix.bindings }}/lib/

      - name: Install dependencies
        working-directory: crates/${{ matrix.bindings }}
        run: bundle install

      - name: Run Rust tests
        if: matrix.test-type == 'rust'
        working-directory: crates/${{ matrix.bindings }}/ext
        run: cargo test

      - name: Run RSpec tests
        if: matrix.test-type == 'rspec'
        working-directory: crates/${{ matrix.bindings }}
        run: bundle exec rspec spec/

  ########################################################################
  # 3. Cross-compile GPU gems for all platforms
  ########################################################################
  cross-gem:
    name: "cross-gem ${{ matrix.bindings }}"
    runs-on: ubuntu-latest
    needs: [native-test]
    if: needs.native-test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true
          working-directory: crates/${{ matrix.bindings }}

      - name: Set up Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-gpu-cross
          bundler-cache: false

      - name: Cross-compile gem
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake cross-native gem

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.bindings }}-gems"
          path: crates/${{ matrix.bindings }}/pkg/*.gem
          retention-days: 7

  ########################################################################
  # 4. Publish GPU gems to RubyGems on tagged releases
  ########################################################################
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings-gpu]
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ matrix.bindings }}-gems"
          path: gems/
          merge-multiple: true

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: |
          for gem in gems/*.gem; do
            gem push "$gem"
          done
