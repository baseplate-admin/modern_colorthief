name: Ruby CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-build:
    name: Ruby build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - run: cargo build --release -p modern-colorthief-ruby
      - run: test -f target/release/libmodern_colorthief_ruby.so
