name: PHP CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-php:
    name: PHP build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/php-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: Verify PHP is available
        run: php --version
      - run: cargo build --release -p modern-colorthief-php
        working-directory: .
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
        working-directory: .
      - run: test -f ../../target/release/libmodern_colorthief.so
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Verify extension loads
        run: |
          php -d extension=../../target/release/libmodern_colorthief.so -r 'echo "Extension loaded: " . phpversion("modern_colorthief") . "\n"; var_dump(function_exists("get_palette")); var_dump(function_exists("get_color"));'
      - name: Test extension with pixel array
        run: |
          php -d extension=../../target/release/libmodern_colorthief.so -r '
          $pixels = [255, 0, 0, 255];
          try { $r = get_palette($pixels, 1, 1, 5, 1); echo "OK: palette has " . count($r) . " colors\n"; } catch (Exception $e) { echo "ERROR: " . $e->getMessage() . "\n"; }
          '
      - name: Run PHP pest tests
        run: |
          php -d extension=../../target/release/libmodern_colorthief.so vendor/bin/pest
