name: GPU

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  gpu-test:
    name: GPU tests (Vulkan) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK + software renderers (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Add Vulkan SDK Bin to PATH so vulkan-1.dll is findable
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
            Write-Host "Added $sdkBin to PATH for subsequent steps"
          }
          # SwiftShader is installed at C:\SwiftShader\ by jakoch/install-vulkan-sdk-action
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
            Write-Host "Set VK_ICD_FILENAMES=$icdJson"
          } else {
            # Fallback: search in VULKAN_SDK
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
              Write-Host "Set VK_ICD_FILENAMES=$fallbackIcd"
            } else {
              $altIcd = "$env:VULKAN_SDK\swiftshader\vk_swiftshader_icd.json"
              if (Test-Path $altIcd) {
                Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$altIcd"
                Write-Host "Set VK_ICD_FILENAMES=$altIcd"
              } else {
                Write-Host "DEBUG: Listing C:\SwiftShader..."
                Get-ChildItem "C:\SwiftShader" -ErrorAction SilentlyContinue | Select-Object Name
                Write-Host "DEBUG: Listing VULKAN_SDK\Bin..."
                Get-ChildItem "$env:VULKAN_SDK\Bin" -Filter "*swiftshader*" -ErrorAction SilentlyContinue | Select-Object Name
                Write-Error "vk_swiftshader_icd.json not found!"
                exit 1
              }
            }
          }

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + software renderers (macOS)
        if: matrix.os == 'macos-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Verify Vulkan (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: vulkaninfo --summary

      - name: Verify Vulkan (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path "$sdkBin\vulkaninfo.exe") {
            & "$sdkBin\vulkaninfo.exe" --summary
          } else {
            Write-Host "vulkaninfo not found, checking loader..."
            Get-ChildItem "$sdkBin" -Filter "*.dll" | Select-Object Name
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Run GPU core tests
        run: cargo test -p modern-colorthief-core-gpu

  gpu-php-test:
    name: GPU PHP pest tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/php-bindings-gpu
    steps:
      - uses: actions/checkout@v6
      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-file: development
          extensions: gd
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - run: cargo build --release -p modern-colorthief-php-gpu
        working-directory: .
      - name: Run Rust GPU core tests
        run: cargo test -p modern-colorthief-core-gpu
        working-directory: .
      - run: test -f ../../target/release/libmodern_colorthief_gpu.so
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP GPU pest tests
        run: |
          php -d extension=../../target/release/libmodern_colorthief_gpu.so vendor/bin/pest

  gpu-python-test:
    name: GPU Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/python-bindings-gpu
    steps:
      - uses: actions/checkout@v6
      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install build tools
        run: pip install maturin pytest Pillow
      - name: Build GPU Python module
        run: maturin develop --release
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
        working-directory: .
      - name: Run GPU Python tests
        run: pytest tests/ -v
