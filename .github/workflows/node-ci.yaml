name: Node CI

on:
  push:
    branches: [ main, master, wasm-fix ]
    tags: [ '*' ]
    paths:
      - 'crates/node-bindings/**'
      - 'crates/node-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/node-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/node-bindings/**'
      - 'crates/node-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/node-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build node bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - working-directory: crates/node-bindings
        run: npm install --legacy-peer-deps && npx napi build --platform --release --output-dir artifacts
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - uses: actions/upload-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts/*.node
          retention-days: 1

  node-test:
    name: Node.js 22
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - working-directory: crates/node-bindings
        run: npm install --legacy-peer-deps && npm run build && npx vitest run

  deno-test:
    name: Deno
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - working-directory: crates/node-bindings
        run: npm install --legacy-peer-deps && npm run build
      - working-directory: crates/node-bindings
        run: deno test --sloppy-imports --no-check --allow-read --allow-env --allow-net --allow-ffi "tests/test_*.ts"

  bun-test:
    name: Bun
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - working-directory: crates/node-bindings
        run: npm install --legacy-peer-deps && npm run build
      - working-directory: crates/node-bindings
        run: bun test --timeout 30000 tests/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [node-test, deno-test, bun-test, build]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: node-native
          path: crates/node-bindings/artifacts
      - working-directory: crates/node-bindings
        run: npm install --legacy-peer-deps
      - working-directory: crates/node-bindings
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
