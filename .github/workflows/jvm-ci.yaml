name: JVM CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-build:
    name: Java 26 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
      - run: cargo build --release -p modern-colorthief-jvm
      - run: test -f target/release/libmodern_colorthief_jvm.so || true
      - name: Run JUnit tests
        working-directory: crates/jvm-bindings/tests
        run: |
          cp ../../target/release/libmodern_colorthief_jvm.so /tmp/
          JAVA_OPTS="-Djava.library.path=/tmp" ./gradlew test

  kotlin-build:
    name: Kotlin build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
      - run: cargo build --release -p modern-colorthief-jvm

  android-check:
    name: Android check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - run: cargo check --target aarch64-linux-android -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-node
