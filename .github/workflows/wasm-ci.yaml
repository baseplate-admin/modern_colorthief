name: WASM CI

on:
  push:
    branches: [ main, master, wasm-fix ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - run: ls -lh target/wasm32-unknown-unknown/release/*.wasm

  cpu-node-tests:
    name: CPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings
        run: wasm-pack build --release --target nodejs
      - working-directory: crates/wasm-bindings
        run: npm ci
      - working-directory: crates/wasm-bindings
        run: npx vitest run --project node

  node-wasm-tests:
    name: Node WASM tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/node-bindings-wasm
        run: wasm-pack build --release --target bundler
      - working-directory: crates/node-bindings-wasm
        run: npm install
      - working-directory: crates/node-bindings-wasm
        run: npx vitest run

  cpu-browser-tests:
    name: CPU Browser tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings
        run: wasm-pack build --release --target web
      - working-directory: crates/wasm-bindings
        run: npm ci
      - name: Install Playwright browsers
        working-directory: crates/wasm-bindings
        run: npx playwright install chromium firefox --with-deps
      - working-directory: crates/wasm-bindings
        run: npx vitest run --project ${{ matrix.browser }}

  gpu-browser-tests:
    name: GPU Browser tests
    runs-on: ubuntu-latest
    needs: [wasm-gpu-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings-gpu
        run: wasm-pack build --release --target web
      - working-directory: crates/wasm-bindings-gpu
        run: npm ci
      - name: Install Playwright browsers
        working-directory: crates/wasm-bindings-gpu
        run: npx playwright install chromium --with-deps
      - name: Run GPU browser tests (skip if WebGPU unavailable)
        working-directory: crates/wasm-bindings-gpu
        run: |
            npx vitest run --project chrome || {
              echo "WebGPU not available in headless CI - skipping GPU browser tests"
              exit 0
            }
        continue-on-error: true

  gpu-node-tests:
    name: GPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-gpu-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings-gpu
        run: wasm-pack build --release --target bundler
      - working-directory: crates/wasm-bindings-gpu
        run: npm ci
      - working-directory: crates/wasm-bindings-gpu
        run: npx vitest run --project node

  wasm-gpu-build:
    name: WASM GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-wasm-gpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-wasm-gpu

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [cpu-node-tests, node-wasm-tests, cpu-browser-tests, gpu-browser-tests, gpu-node-tests]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings
        run: wasm-pack build --release
      - working-directory: crates/wasm-bindings
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - working-directory: crates/node-bindings-wasm
        run: wasm-pack build --release --target bundler
      - working-directory: crates/node-bindings-wasm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
