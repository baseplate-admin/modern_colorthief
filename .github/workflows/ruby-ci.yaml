name: Ruby CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/
          retention-days: 1
          if-no-files-found: error

  gpu-build:
    name: "gpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          cache: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/
          retention-days: 1
          if-no-files-found: error

  cpu-test:
    name: "cpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Run Rust tests
        working-directory: crates/ruby-bindings/ext
        run: cargo test

   
  gpu-rspec:
    name: "gpu-rspec — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
        # Note: ubuntu-latest excluded — GPU extension segfaults on Linux CI.
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK + software renderers
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Add Vulkan SDK Bin to PATH so vulkan-1.dll is findable by ash crate
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            $env:PATH = "$sdkBin;$env:PATH"
            [Environment]::SetEnvironmentVariable("PATH", $env:PATH, "Process")
          }
          # Point Vulkan loader to SwiftShader ICD
          $icdJson = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            [Environment]::SetEnvironmentVariable("VK_ICD_FILENAMES", $icdJson, "Process")
            Write-Host "Set VK_ICD_FILENAMES=$icdJson"
          } else {
            $altIcd = "$env:VULKAN_SDK\swiftshader\vk_swiftshader_icd.json"
            if (Test-Path $altIcd) {
              [Environment]::SetEnvironmentVariable("VK_ICD_FILENAMES", $altIcd, "Process")
              Write-Host "Set VK_ICD_FILENAMES=$altIcd"
            } else {
              Write-Host "WARNING: vk_swiftshader_icd.json not found, listing SDK Bin contents..."
              Get-ChildItem "$sdkBin" -ErrorAction SilentlyContinue | Select-Object Name
            }
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-gpu-rspec-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-rspec-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-rspec

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/

      - name: Install dependencies
        working-directory: crates/ruby-bindings-gpu
        run: bundle install

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings-gpu
        run: bundle exec rspec spec/

  cross-gem-cpu:
    name: cross-gem-cpu
    runs-on: ubuntu-latest
    needs: [cpu-test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true

      - name: Cross-compile CPU gem
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake native

      - name: Upload CPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gems
          path: crates/ruby-bindings/pkg/*.gem
          retention-days: 7

  cross-gem-gpu:
    name: cross-gem-gpu
    runs-on: ubuntu-latest
    needs: [gpu-rspec]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true

      - name: Cross-compile GPU gem
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake native

      - name: Upload GPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: crates/ruby-bindings-gpu/pkg/*.gem
          retention-days: 7

  publish-cpu:
    name: Publish CPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem-cpu]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem

  publish-gpu:
    name: Publish GPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem-gpu]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem
