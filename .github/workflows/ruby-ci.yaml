name: Ruby CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-build:
    name: Ruby build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - run: cargo build --release -p modern-colorthief-ruby
      - run: test -f target/release/libmodern_colorthief_ruby.so
      - working-directory: crates/ruby-bindings
        run: |
          bundle install
          RUBYLIB=target/release:$RUBYLIB bundle exec rspec spec/

  ruby-gpu-build:
    name: Ruby GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - run: cargo build --release -p modern-colorthief-ruby-gpu
      - run: test -f target/release/libmodern_colorthief_ruby_gpu.so
      - working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          RUBYLIB=target/release:$RUBYLIB bundle exec rspec spec/
