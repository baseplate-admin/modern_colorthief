name: JVM CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request
  workflow_dispatch

permissions:
  contents: read

jobs:
  java-test:
    name: Java 26 test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/jvm-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '26'
      - name: Build
        run: cargo build --release -p colorthief-jvm
      - name: Verify library
        run: file target/release/libcolorthief_jvm.so || true

  kotlin-test:
    name: Kotlin test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/jvm-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '26'
      - uses: kotlin-actions/setup-kotlin@v1
        with:
          version: v2.1
      - name: Build
        run: cargo build --release -p colorthief-jvm
      - name: Verify Kotlin compatibility
        run: kotlinc -nowarn examples/ColorthiefTest.kt -include-runtime -d colorthief-test.jar || true

  android-check:
    name: Android compatibility check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android
      - name: Check Android build
        run: cargo check --target aarch64-linux-android -p colorthief-jvm || true
