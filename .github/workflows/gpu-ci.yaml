name: GPU

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gpu-test:
    name: GPU tests (Vulkan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: humbletim/setup-vulkan-sdk@v1
        with:
          vulkan-install-method: VULKAN_SDK
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Run GPU core tests
        run: cargo test -p modern-colorthief-core-gpu -- --include-ignored

  gpu-php-test:
    name: GPU PHP pest tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/php-bindings-gpu
    steps:
      - uses: actions/checkout@v6
      - uses: humbletim/setup-vulkan-sdk@v1
        with:
          vulkan-install-method: VULKAN_SDK
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - run: cargo build --release -p modern-colorthief-php-gpu
        working-directory: .
      - name: Run Rust GPU core tests
        run: cargo test -p modern-colorthief-core-gpu -- --include-ignored
        working-directory: .
      - run: test -f ../../target/release/libmodern_colorthief_gpu.so
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP GPU pest tests
        run: |
          php -d extension=../../target/release/libmodern_colorthief_gpu.so vendor/bin/pest

  gpu-python-test:
    name: GPU Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/python-bindings-gpu
    steps:
      - uses: actions/checkout@v6
      - uses: humbletim/setup-vulkan-sdk@v1
        with:
          vulkan-install-method: VULKAN_SDK
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install build tools
        run: pip install maturin pytest Pillow
      - name: Build GPU Python module
        run: maturin develop --release
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
        working-directory: .
      - name: Run GPU Python tests
        run: pytest tests/ -v
