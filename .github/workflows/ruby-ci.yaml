name: Ruby CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

# https://github.com/oxidize-rb/actions/tree/main/cross-gem

jobs:
  ruby-cpu-build:
    name: Ruby CPU build + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: crates/ruby-bindings
    steps:
      - uses: actions/checkout@v4

      - name: Prepare gem workspace
        run: |
          cp -r ../core ./modern-colorthief-core
          cp -r ../core_cpu ./modern-colorthief-core-cpu
          for d in ./modern-colorthief-core ./modern-colorthief-core-cpu; do
            sed -i 's/^version\.workspace = true$/version = "0.3.0"/' "$d/Cargo.toml"
            sed -i 's/^edition\.workspace = true$/edition = "2024"/' "$d/Cargo.toml"
            sed -i 's/^rayon\.workspace = true$/rayon = "1.10"/' "$d/Cargo.toml" || true
          done
          sed -i 's|path = "\.\./core"|path = "../modern-colorthief-core"|' ./modern-colorthief-core-cpu/Cargo.toml
          cat <<'EOD' > Cargo.toml
          [workspace]
          members = ["ext", "modern-colorthief-core", "modern-colorthief-core-cpu"]
          EOD

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@main
        with:
          ruby-version: "3.4"
          bundler-cache: false
          cargo-cache: true
          cargo-vendor: true
          cache-version: v0-cpu
          working-directory: crates/ruby-bindings

      - name: Build gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: x86_64-linux
          ruby-versions: "3.4"
          working-directory: crates/ruby-bindings

      - name: Run RSpec tests
        run: |
          bundle install
          bundle exec rspec spec/

  ruby-gpu-build:
    name: Ruby GPU build + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: crates/ruby-bindings-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Prepare gem workspace
        run: |
          cp -r ../core ./modern-colorthief-core
          cp -r ../core_gpu ./modern-colorthief-core-gpu
          for d in ./modern-colorthief-core ./modern-colorthief-core-gpu; do
            sed -i 's/^version\.workspace = true$/version = "0.3.0"/' "$d/Cargo.toml"
            sed -i 's/^edition\.workspace = true$/edition = "2024"/' "$d/Cargo.toml"
            sed -i 's/^ash\.workspace = true$/ash = "0.38"/' "$d/Cargo.toml" || true
          done
          sed -i 's|path = "\.\./core"|path = "../modern-colorthief-core"|' ./modern-colorthief-core-gpu/Cargo.toml
          cat <<'EOD' > Cargo.toml
          [workspace]
          members = ["ext", "modern-colorthief-core", "modern-colorthief-core-gpu"]
          EOD

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@main
        with:
          ruby-version: "3.4"
          bundler-cache: false
          cargo-cache: true
          cargo-vendor: true
          cache-version: v0-gpu
          working-directory: crates/ruby-bindings-gpu

      - name: Build gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: x86_64-linux
          ruby-versions: "3.4"
          working-directory: crates/ruby-bindings-gpu

      - name: Run RSpec tests
        run: |
          bundle install
          bundle exec rspec spec/
