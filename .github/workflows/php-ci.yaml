name: PHP CI

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/php-bindings/**'
      - 'crates/php-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/php-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/php-bindings/**'
      - 'crates/php-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/php-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-file: development
          extensions: gd
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - name: Build PHP extension (PGO)
        run: cargo pgo optimize -- --release --target x86_64-unknown-linux-gnu -p modern-colorthief-php
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Upload native extension
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-php-cpu
          path: target/x86_64-unknown-linux-gnu/release/libmodern_colorthief.so
          retention-days: 1

  cpu-test:
    name: "cpu-pest"
    needs: [cpu-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-file: development
          extensions: gd
      - name: Download native extension
        uses: actions/download-artifact@v4
        with:
          name: native-lib-php-cpu
          path: target/release
      - name: Verify extension
        run: test -f target/release/libmodern_colorthief.so
      - name: Install PHP dependencies
        working-directory: crates/php-bindings
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP tests
        working-directory: crates/php-bindings
        run: php -d extension=../../target/release/libmodern_colorthief.so vendor/bin/pest

  gpu-build:
    name: "gpu-build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-file: development
          extensions: gd
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu --target x86_64-unknown-linux-gnu
      - name: Build GPU PHP extension (PGO)
        run: cargo pgo optimize -- --release --target x86_64-unknown-linux-gnu -p modern-colorthief-php-gpu
      - name: Run Rust GPU tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu
      - name: Upload GPU native extension
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-php-gpu
          path: target/x86_64-unknown-linux-gnu/release/libmodern_colorthief_gpu.so
          retention-days: 1

  gpu-test:
    name: "gpu-pest"
    needs: [gpu-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-file: development
          extensions: gd
      - name: Download GPU native extension
        uses: actions/download-artifact@v4
        with:
          name: native-lib-php-gpu
          path: target/release
      - name: Verify GPU extension
        run: test -f target/release/libmodern_colorthief_gpu.so
      - name: Install PHP dependencies
        working-directory: crates/php-bindings-gpu
        run: composer install --no-interaction --prefer-dist
      - name: Run GPU PHP tests
        working-directory: crates/php-bindings-gpu
        run: php -d extension=../../target/release/libmodern_colorthief_gpu.so vendor/bin/pest
