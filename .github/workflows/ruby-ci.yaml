name: Ruby CI

on:
  push:
    branches: [ main, master ]
    tags: ['*']
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-build

      - name: Install llvm-tools-preview + cargo-pgo (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-pgo --locked --version 0.3.0

      - name: Install llvm-tools-preview (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup component add llvm-tools-preview

      - name: PGO profile generation
        if: matrix.os != 'windows-latest'
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu

      - name: Build native extension (PGO)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd crates/ruby-bindings
          bundle install
          # Use cargo pgo optimize to build with PGO (handles profile merge internally)
          cargo pgo optimize -- --release -p modern_colorthief
          # Copy the compiled library to lib/ for the gem
          cp target/release/libmodern-colorthief.* lib/

      - name: Build native extension (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd crates/ruby-bindings
          bundle install
          # PGO not supported on Windows GNU toolchain, use regular release build
          cargo build --release -p modern_colorthief
          # Copy the compiled library to lib/ for the gem
          cp target/release/libmodern-colorthief.* lib/

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/
          retention-days: 7
          if-no-files-found: error

  cpu-test:
    name: "cpu-rspec — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rspec -I. spec/

  gpu-build:
    name: "gpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-build

      - name: Install llvm-tools-preview + cargo-pgo (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-pgo --locked --version 0.3.0

      - name: Install llvm-tools-preview (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup component add llvm-tools-preview

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + software renderers (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Install Vulkan SDK + software renderers (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: PGO profile generation
        if: matrix.os != 'windows-latest'
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu

      - name: Build native extension (PGO)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd crates/ruby-bindings-gpu
          bundle install
          # Use cargo pgo optimize to build with PGO (handles profile merge internally)
          cargo pgo optimize -- --release -p modern_colorthief_gpu
          # Copy the compiled library to lib/ for the gem
          cp target/release/libmodern-colorthief-gpu.* lib/

      - name: Build native extension (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd crates/ruby-bindings-gpu
          bundle install
          # PGO not supported on Windows GNU toolchain, use regular release build
          cargo build --release -p modern_colorthief_gpu
          # Copy the compiled library to lib/ for the gem
          cp target/release/libmodern-colorthief-gpu.* lib/

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/
          retention-days: 7
          if-no-files-found: error

  gpu-rust-test:
    name: "gpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ matrix.os }}-gpu-rust-test-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-rust-test-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-rust-test

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + software renderers (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Install Vulkan SDK + software renderers (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/

      - name: Install dependencies
        working-directory: crates/ruby-bindings-gpu
        run: bundle install

      - name: Run Rust GPU tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings-gpu
        run: bundle exec rspec spec/

  cross-gem-cpu:
    name: cross-gem-cpu
    runs-on: ubuntu-latest
    needs: [cpu-test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true

      - name: Cross-compile CPU gem
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake native

      - name: Upload CPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gems
          path: crates/ruby-bindings/pkg/*.gem
          retention-days: 7

  cross-gem-gpu:
    name: cross-gem-gpu
    runs-on: ubuntu-latest
    needs: [gpu-rust-test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest
          bundler-cache: true

      - name: Cross-compile GPU gem
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake native

      - name: Upload GPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: crates/ruby-bindings-gpu/pkg/*.gem
          retention-days: 7

  publish-cpu:
    name: Publish CPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem-cpu]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem

  publish-gpu:
    name: Publish GPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem-gpu]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem
