name: Python CI

on:
  push:
    branches: [ main, master, add-wasm ]
    tags: [ '*' ]
    paths:
      - 'crates/python-bindings/**'
      - 'crates/python-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/python-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/python-bindings/**'
      - 'crates/python-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/python-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  # =========================================================================
  # CPU wheel builds — one job per platform family (used for release + testing)
  # =========================================================================
  cpu-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: "wheels-cpu-linux-${{ matrix.target }}"
          path: dist
          retention-days: 7

  cpu-musllinux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7]
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: "wheels-cpu-musllinux-${{ matrix.target }}"
          path: dist
          retention-days: 7

  cpu-windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: "wheels-cpu-windows-${{ matrix.platform.target }}"
          path: dist
          retention-days: 7

  cpu-macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: "wheels-cpu-macos-${{ matrix.platform.target }}"
          path: dist
          retention-days: 7

  cpu-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux-android, x86_64-linux-android]
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --manifest-path crates/python-bindings/Cargo.toml --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: "wheels-cpu-android-${{ matrix.target }}"
          path: dist
          retention-days: 7

  cpu-sdist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/python-bindings
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/python-bindings/Cargo.toml --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-sdist
          path: dist
          retention-days: 7

  # =========================================================================
  # CPU integration tests — download built wheel, run pytest
  # =========================================================================
  cpu-pytest:
    name: "cpu-pytest — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-linux, cpu-windows, cpu-macos]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: crates/python-bindings
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-linux-x86_64
          path: crates/python-bindings/dist
        if: matrix.os == 'ubuntu-latest'

      - name: Download built wheel (macos-15-intel)
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-macos-x86_64
          path: crates/python-bindings/dist
        if: matrix.os == 'macos-15-intel'

      - name: Download built wheel (macos-latest)
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-macos-aarch64
          path: crates/python-bindings/dist
        if: matrix.os == 'macos-latest'

      - name: Download built wheel (windows-latest)
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-windows-x64
          path: crates/python-bindings/dist
        if: matrix.os == 'windows-latest'

      - name: Install wheel + pytest
        run: |
          WHEEL=$(ls dist/*.whl)
          uv pip install --system "$WHEEL" pytest

      - name: Run pytest
        run: pytest tests/ -v

  # =========================================================================
  # GPU build — build GPU Python module on all 3 OS (no tests, Vulkan available)
  # =========================================================================
  gpu-build:
    name: "gpu-build — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    defaults:
      run:
        working-directory: crates/python-bindings-gpu
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        working-directory: .
        run: bash .github/scripts/setup_vulkan_macos.sh

      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-python-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Build GPU Python module
        run: |
          uv venv .venv
          uv pip install maturin
          uv run maturin build --release --out dist

      - name: Upload GPU wheel
        uses: actions/upload-artifact@v4
        with:
          name: "wheel-gpu-${{ matrix.os }}"
          path: crates/python-bindings-gpu/dist
          retention-days: 1

  # =========================================================================
  # GPU Rust unit tests — run Rust GPU unit tests (Vulkan required)
  # =========================================================================
  gpu-rust-test:
    name: "gpu-rust-test — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-python-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Run Rust GPU unit tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu
        working-directory: .

  # =========================================================================
  # GPU integration tests — download built GPU wheel, run pytest GPU
  # =========================================================================
  gpu-pytest:
    name: "gpu-pytest — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    defaults:
      run:
        working-directory: crates/python-bindings-gpu
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools

      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true

      - name: Setup SwiftShader (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }

      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Setup Vulkan environment (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        working-directory: .
        run: bash .github/scripts/setup_vulkan_macos.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download GPU wheel
        uses: actions/download-artifact@v4
        with:
          name: "wheel-gpu-${{ matrix.os }}"
          path: crates/python-bindings-gpu/dist

      - name: Install GPU wheel + pytest
        run: |
          WHEEL=$(ls dist/*.whl)
          uv venv .venv
          uv pip install pytest Pillow "$WHEEL"

      - name: Run GPU pytest
        run: uv run pytest tests/ -v

  # =========================================================================
  # Release — collect all wheels, attest, publish
  # =========================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [cpu-pytest, gpu-rust-test, gpu-pytest]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: Download CPU wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-cpu-*
          merge-mappings: true
          path: wheels-cpu

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: 'wheels-cpu/*'

      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v8.2.0

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-cpu/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
