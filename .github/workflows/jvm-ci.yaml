name: JVM CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-build:
    name: Java 26 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Build JVM native library
        run: cargo build --release -p modern-colorthief-jvm
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Verify shared library built
        run: test -f target/release/libmodern_colorthief.so
      - name: Copy native lib for JNI
        run: cp target/release/libmodern_colorthief.so /tmp/
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Gradle wrapper
        working-directory: crates/jvm-bindings/tests
        run: gradle wrapper
      - name: Run JUnit tests
        working-directory: crates/jvm-bindings/tests
        run: |
          export JAVA_TOOL_OPTIONS="-Djava.library.path=/tmp"
          ./gradlew test

  kotlin-build:
    name: Kotlin build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p modern-colorthief-jvm

  android-check:
    name: Android check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: cargo check --target aarch64-linux-android -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-node
