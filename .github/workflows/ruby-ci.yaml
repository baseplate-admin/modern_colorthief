name: Ruby CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request
  workflow_dispatch

permissions:
  contents: read

jobs:
  ruby-test:
    name: Ruby test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/ruby-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Build
        run: cargo build --release -p colorthief-ruby
      - name: Verify library
        run: file target/release/libcolorthief_ruby.so || true
