name: WASM CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request
  workflow_dispatch

permissions:
  contents: read

jobs:
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown
      - name: Check WASM build
        run: cargo check --target wasm32-unknown-unknown -p colorthief-wasm
      - name: Build release WASM
        run: cargo build --target wasm32-unknown-unknown --release -p colorthief-wasm
      - name: Check WASM size
        run: ls -lh target/wasm32-unknown-unknown/release/colorthief_wasm.wasm

  wasm-pack-build:
    name: wasm-pack build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/wasm-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build with wasm-pack
        run: wasm-pack build --release
      - name: Run tests
        run: npm ci && npm test

  publish-npm-wasm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [wasm-build, wasm-pack-build]
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: crates/wasm-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build
        run: wasm-pack build --release
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
