name: PHP CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev php-dev
      - name: Verify PHP is available
        run: php --version
      - name: Build PHP bindings
        id: build
        run: |
          OUTPUT=$(cargo build --release -p modern-colorthief-php 2>&1)
          RC=$?
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/php.log
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then exit 1; fi
        continue-on-error: true
      - name: Show build error
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "::error::PHP build failed with exit code ${{ steps.build.outputs.exit_code }}"
          head -100 /tmp/php.log | while IFS= read -r line; do echo "::error title=PHP build::$line"; done
          exit 1
      - name: Run Rust core tests
        continue-on-error: true
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Verify shared library exists
        run: |
          if [ -f target/release/libmodern_colorthief_php.so ]; then
            echo "Found .so file"
          elif [ -f target/release/modern_colorthief_php.dll ]; then
            echo "Found .dll file"
          else
            echo "No shared library found"
            ls -la target/release/ | grep -i colorthief || true
            exit 1
          fi
