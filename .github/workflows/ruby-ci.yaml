name: Ruby CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ########################################################################
  # 1. Native build + test on real runners (Linux / macOS / Windows)
  ########################################################################
  native-test:
    name: "${{ matrix.bindings }} — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["3.2", "3.3", "3.4"]
        bindings: [ruby-bindings, ruby-bindings-gpu]
        exclude:
          # GPU (Vulkan) tests only on Linux and macOS runners
          - os: windows-latest
            bindings: ruby-bindings-gpu
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-native

      - name: Build native extension
        working-directory: crates/${{ matrix.bindings }}
        run: |
          bundle install
          bundle exec rake compile

      - name: Run RSpec tests
        working-directory: crates/${{ matrix.bindings }}
        run: bundle exec rspec spec/

  ########################################################################
  # 2. Cross-compile gems for all 5 platforms
  ########################################################################
  cross-gem:
    name: "cross-gem ${{ matrix.bindings }} — ${{ matrix.platform }}"
    runs-on: ubuntu-latest
    needs: [native-test]
    if: needs.native-test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        platform: [x86_64-linux, aarch64-linux, x86_64-darwin, arm64-darwin, x64-mingw-ucrt]
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-cross
          working-directory: crates/${{ matrix.bindings }}

      - name: Cross-compile gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.2,3.3,3.4"
          working-directory: crates/${{ matrix.bindings }}
          cache-save-always: true

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.bindings }}-${{ matrix.platform }}-gem"
          path: crates/${{ matrix.bindings }}/pkg/*.gem
          retention-days: 7

  ########################################################################
  # 3. Publish gems to RubyGems on tagged releases
  ########################################################################
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bindings: [ruby-bindings, ruby-bindings-gpu]
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ matrix.bindings }}-*-gem"
          path: gems/
          merge-multiple: true

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: |
          for gem in gems/*.gem; do
            gem push "$gem"
          done
