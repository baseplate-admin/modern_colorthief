name: Ruby CI

on:
  push:
    branches: [ main, master, add-wasm ]
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/ruby-bindings/**'
      - 'crates/ruby-bindings-gpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core/**'
      - '.github/workflows/ruby-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/
          retention-days: 1
          if-no-files-found: error

  gpu-build:
    name: "gpu-build — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          cache: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-build-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-build

      - name: Build native extension
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake compile

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/
          retention-days: 1
          if-no-files-found: error

  cpu-test:
    name: "cpu-rust-test — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [cpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cpu-test-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-cpu-test

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-cpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings/lib/

      - name: Run Rust tests
        working-directory: crates/ruby-bindings/ext
        run: cargo test

   
  gpu-rspec:
    name: "gpu-rspec — ${{ matrix.os }} / ruby ${{ matrix.ruby }}"
    runs-on: ${{ matrix.os }}
    needs: [gpu-build]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest, windows-latest]
        ruby: ["2.7", "3.2", "3.3", "3.4"]
        # Note: ubuntu-latest excluded — GPU extension segfaults on Linux CI
        # due to Vulkan software renderer incompatibility. gpu-build still
        # runs on ubuntu-latest to catch compile errors.
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK + software renderers
        if: ${{ !contains(matrix.os, 'windows') }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true

      - name: Install Vulkan SDK + Lavapipe (Windows)
        if: ${{ contains(matrix.os, 'windows') }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: false
          cache: true

      - name: Unregister SwiftShader ICD (Windows)
        if: ${{ contains(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          $keys = Get-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -ErrorAction SilentlyContinue
          if ($keys) {
            Remove-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Name "C:\hostedtoolcache\windows\swiftshader\5.0.0.1\x64\vk_swiftshader_icd.json" -ErrorAction SilentlyContinue
            Remove-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Name "C:\Swiftshader\vk_swiftshader_icd.json" -ErrorAction SilentlyContinue
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-gpu-rspec-ruby${{ matrix.ruby }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-gpu-rspec-ruby${{ matrix.ruby }}-cargo-target-

      - name: Set up Ruby and Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: latest
          bundler-cache: true
          cargo-cache: false
          cache-version: v1-gpu-rspec

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: "lib-gpu-${{ matrix.os }}-ruby${{ matrix.ruby }}"
          path: crates/ruby-bindings-gpu/lib/

      - name: Install dependencies
        working-directory: crates/ruby-bindings-gpu
        run: bundle install

      - name: Run RSpec tests
        working-directory: crates/ruby-bindings-gpu
        run: bundle exec rspec spec/

  cross-gem:
    name: cross-gem
    runs-on: ubuntu-latest
    needs: [cpu-test, gpu-rspec]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: latest

      - name: Set up Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-cross
          bundler-cache: false

      - name: Cross-compile CPU gem
        working-directory: crates/ruby-bindings
        run: |
          bundle install
          bundle exec rake cross-native gem

      - name: Cross-compile GPU gem
        working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install
          bundle exec rake cross-native gem

      - name: Upload CPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gems
          path: crates/ruby-bindings/pkg/*.gem
          retention-days: 7

      - name: Upload GPU gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: crates/ruby-bindings-gpu/pkg/*.gem
          retention-days: 7

  publish-cpu:
    name: Publish CPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem

  publish-gpu:
    name: Publish GPU gem
    runs-on: ubuntu-latest
    needs: [cross-gem]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v4
        with:
          name: ruby-bindings-gpu-gems
          path: gems/

      - name: Publish to RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          rubygems: latest
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - run: gem push gems/*.gem
