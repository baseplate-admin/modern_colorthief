name: WASM CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
    paths:
      - 'crates/wasm-bindings/**'
      - 'crates/wasm-bindings-webgpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/wasm-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/wasm-bindings/**'
      - 'crates/wasm-bindings-webgpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/wasm-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-webgpu -p modern-colorthief-wasm -p modern-colorthief-webgpu -p modern-colorthief-node-wasm
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Build WASM with PGO
        run: cargo pgo optimize -- --release --target wasm32-unknown-unknown -p modern-colorthief-core-webgpu -p modern-colorthief-wasm -p modern-colorthief-webgpu -p modern-colorthief-node-wasm
      - run: ls -lh target/wasm32-unknown-unknown/release/*.wasm

  wasm-pack-build:
    name: wasm-pack build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - name: Build WASM with PGO
        run: |
          export RUSTFLAGS="-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
          wasm-pack build --release --target nodejs
        working-directory: crates/wasm-bindings
      - working-directory: crates/wasm-bindings
        run: npm install && npm test

  wasm-gpu-build:
    name: WASM GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: Install Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-webgpu -p modern-colorthief-webgpu
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu --target x86_64-unknown-linux-gnu
      - name: Build WASM GPU with PGO
        run: cargo pgo optimize -- --release --target wasm32-unknown-unknown -p modern-colorthief-core-webgpu -p modern-colorthief-webgpu

  gpu-node-tests:
    name: GPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-gpu-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: Install Vulkan SDK + Lavapipe
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_lavapipe: true
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu --target x86_64-unknown-linux-gnu
      - run: cargo install wasm-pack --locked
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install node-webgpu (Dawn) + deps
        working-directory: crates/wasm-bindings-webgpu
        run: npm ci
      - name: Verify webgpu module loads
        working-directory: crates/wasm-bindings-webgpu
        run: node test-webgpu-setup.cjs && echo "WebGPU OK"
      - name: Run GPU Node.js tests (PGO)
        working-directory: crates/wasm-bindings-webgpu
        run: |
          export RUSTFLAGS="-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
          wasm-pack test --node --release
        env:
          NODE_OPTIONS: "--require ${{ github.workspace }}/crates/wasm-bindings-webgpu/test-webgpu-setup.cjs"

  cpu-chrome-tests:
    name: CPU Chrome tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - run: cargo install wasm-pack --locked
      - uses: nanasess/setup-chromedriver@v3
      - name: Run Chrome tests (PGO)
        working-directory: crates/wasm-bindings
        run: |
          export RUSTFLAGS="-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
          wasm-pack test --headless --chrome --release -- --features browser-tests

  cpu-firefox-tests:
    name: CPU Firefox tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - run: cargo install wasm-pack --locked
      - uses: browser-actions/setup-geckodriver@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: geckodriver --version
      - name: Run Firefox tests (PGO)
        working-directory: crates/wasm-bindings
        run: |
          export RUSTFLAGS="-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
          wasm-pack test --headless --firefox --release -- --features browser-tests

  cpu-node-tests:
    name: CPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install cargo-pgo
        run: cargo install cargo-pgo --locked --version 0.3.0
      - name: PGO profile generation
        run: cargo pgo test -- -p modern-colorthief-core -p modern-colorthief-core-cpu --target x86_64-unknown-linux-gnu
      - run: cargo install wasm-pack --locked
      - name: Run Node tests (PGO)
        working-directory: crates/wasm-bindings
        run: |
          export RUSTFLAGS="-Cprofile-use=${{ github.workspace }}/target/pgo-profiles/merged.profdata"
          wasm-pack test --node --release
