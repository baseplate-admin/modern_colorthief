name: PHP CI

on:
  push:
    branches: [main, master]
    tags: ['*']
    paths:
      - 'crates/php-bindings/**'
      - 'crates/php-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/php-ci.yaml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'crates/php-bindings/**'
      - 'crates/php-bindings-gpu/**'
      - 'crates/core_cpu/**'
      - 'crates/core_gpu/**'
      - 'crates/core/**'
      - '.github/workflows/php-ci.yaml'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.304.1

jobs:
  cpu-build:
    name: "cpu-build — ${{ matrix.target }} — PHP ${{ matrix.php-version }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
        php-version: ['8.3', '8.4']
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            lib: libmodern_colorthief.so
            shell: bash
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            lib: libmodern_colorthief.so
            shell: bash
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            lib: libmodern_colorthief.dylib
            shell: bash
          - target: aarch64-apple-darwin
            runner: macos-latest
            lib: libmodern_colorthief.dylib
            shell: bash
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            lib: modern_colorthief.dll
            shell: pwsh
        exclude:
          # Only build all PHP versions for Linux x86_64 (the test platform)
          # Other platforms build PHP 8.4 only (Rust ABI compatibility verified on Linux)
          - target: aarch64-unknown-linux-gnu
            php-version: '8.3'
          - target: x86_64-apple-darwin
            php-version: '8.3'
          - target: aarch64-apple-darwin
            php-version: '8.3'
          - target: x86_64-pc-windows-msvc
            php-version: '8.3'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php-version }}'
          ini-file: development
          extensions: gd
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install nightly (Windows)
        if: ${{ contains(matrix.target, '-pc-windows-msvc') }}
        run: rustup toolchain install nightly
      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-php${{ matrix.php-version }}
      - name: Install system dependencies (Linux)
        if: ${{ contains(matrix.target, '-linux-gnu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev
      - name: Install system dependencies (macOS)
        if: ${{ contains(matrix.target, '-apple-darwin') }}
        run: |
          brew install llvm
      - name: Setup LLVM (Windows)
        if: ${{ contains(matrix.target, '-windows-') }}
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: 21
      - name: Build PHP extension
        if: ${{ !contains(matrix.target, '-pc-windows-msvc') }}
        run: cargo build --release --target ${{ matrix.target }} -p modern-colorthief-php
        env:
          MACOSX_DEPLOYMENT_TARGET: 10.12
          RUSTFLAGS: ${{ contains(matrix.target, '-apple-darwin') && '-C link-arg=-undefined -C link-arg=dynamic_lookup' || '' }}
      - name: Build PHP extension (Windows)
        if: ${{ contains(matrix.target, '-pc-windows-msvc') }}
        run: cargo +nightly build --release --target ${{ matrix.target }} -p modern-colorthief-php
      - name: Run Rust core tests
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' && matrix.php-version == '8.4' }}
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Upload native extension
        uses: actions/upload-artifact@v7
        with:
          name: "native-lib-php-cpu-${{ matrix.target }}-php${{ matrix.php-version }}"
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 7

  cpu-test:
    name: "cpu-test — ${{ matrix.os }} — PHP ${{ matrix.php-version }}"
    needs: [cpu-build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
        php-version: ['8.3', '8.4']
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libmodern_colorthief.so
            shell: bash
          - os: macos-15-intel
            target: x86_64-apple-darwin
            lib: libmodern_colorthief.dylib
            shell: bash
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: modern_colorthief.dll
            shell: pwsh
        exclude:
          # macOS/Windows only have PHP 8.4 builds; Linux tests all versions
          - os: macos-15-intel
            php-version: '8.3'
          - os: windows-latest
            php-version: '8.3'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php-version }}'
          ini-file: development
          extensions: gd
      - name: Download native extension
        uses: actions/download-artifact@v8
        with:
          name: native-lib-php-cpu-${{ matrix.target }}-php${{ matrix.php-version }}
          path: target/release
      - name: Verify extension
        shell: bash
        run: test -f target/release/${{ matrix.lib }}
      - name: Install PHP dependencies
        working-directory: crates/php-bindings
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP tests
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        working-directory: crates/php-bindings
        run: php -d extension=../../target/release/${{ matrix.lib }} vendor/bin/pest
      - name: Skip PHP tests on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Write-Host "PHP extension tests skipped on Windows."
          Write-Host "Rust nightly stdlibs are linked with a different MSVCRT version than PHP expects."
          Write-Host "This is a Rust toolchain issue, not a code issue. Rust code is tested on Linux/macOS."

  gpu-build:
    name: "gpu-build — ${{ matrix.target }} — PHP ${{ matrix.php-version }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
        php-version: ['8.3', '8.4']
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            lib: libmodern_colorthief_gpu.so
            shell: bash
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            lib: libmodern_colorthief_gpu.so
            shell: bash
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            lib: libmodern_colorthief_gpu.dylib
            shell: bash
          - target: aarch64-apple-darwin
            runner: macos-latest
            lib: libmodern_colorthief_gpu.dylib
            shell: bash
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            lib: modern_colorthief_gpu.dll
            shell: pwsh
        exclude:
          # Only build all PHP versions for Linux x86_64 (the test platform)
          # Other platforms build PHP 8.4 only
          - target: aarch64-unknown-linux-gnu
            php-version: '8.3'
          - target: x86_64-apple-darwin
            php-version: '8.3'
          - target: aarch64-apple-darwin
            php-version: '8.3'
          - target: x86_64-pc-windows-msvc
            php-version: '8.3'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php-version }}'
          ini-file: development
          extensions: gd
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install nightly (Windows)
        if: ${{ contains(matrix.target, '-pc-windows-msvc') }}
        run: rustup toolchain install nightly
      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-php${{ matrix.php-version }}
      - name: Install Vulkan runtime (Linux)
        if: ${{ contains(matrix.target, '-linux-gnu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: ${{ contains(matrix.target, '-windows-') }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true
          github_token: ${{ github.token }}
      - name: Setup SwiftShader (Windows)
        if: ${{ contains(matrix.target, '-windows-') }}
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }
      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: ${{ contains(matrix.target, '-apple-darwin') }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true
          github_token: ${{ github.token }}
      - name: Setup Vulkan environment (macOS)
        if: ${{ contains(matrix.target, '-apple-darwin') }}
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh
      - name: Install system dependencies (Linux)
        if: ${{ contains(matrix.target, '-linux-gnu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev
      - name: Install system dependencies (macOS)
        if: ${{ contains(matrix.target, '-apple-darwin') }}
        run: |
          brew install llvm
      - name: Setup LLVM (Windows)
        if: ${{ contains(matrix.target, '-windows-') }}
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: 21
      - name: Build GPU PHP extension
        if: ${{ !contains(matrix.target, '-pc-windows-msvc') }}
        run: cargo build --release --target ${{ matrix.target }} -p modern-colorthief-php-gpu
        env:
          MACOSX_DEPLOYMENT_TARGET: 10.12
          RUSTFLAGS: ${{ contains(matrix.target, '-apple-darwin') && '-C link-arg=-undefined -C link-arg=dynamic_lookup' || '' }}
      - name: Build GPU PHP extension (Windows)
        if: ${{ contains(matrix.target, '-pc-windows-msvc') }}
        run: cargo +nightly build --release --target ${{ matrix.target }} -p modern-colorthief-php-gpu
      - name: Run Rust GPU tests
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' && matrix.php-version == '8.4' }}
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu -p modern-colorthief-core-gpu
      - name: Upload GPU native extension
        uses: actions/upload-artifact@v7
        with:
          name: "native-lib-php-gpu-${{ matrix.target }}-php${{ matrix.php-version }}"
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 7

  gpu-test:
    name: "gpu-test — ${{ matrix.os }} — PHP ${{ matrix.php-version }}"
    needs: [gpu-build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
        php-version: ['8.3', '8.4']
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libmodern_colorthief_gpu.so
            shell: bash
          - os: macos-15-intel
            target: x86_64-apple-darwin
            lib: libmodern_colorthief_gpu.dylib
            shell: bash
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: modern_colorthief_gpu.dll
            shell: pwsh
        exclude:
          # macOS/Windows only have PHP 8.4 builds; Linux tests all versions
          - os: macos-15-intel
            php-version: '8.3'
          - os: windows-latest
            php-version: '8.3'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php-version }}'
          ini-file: development
          extensions: gd
      - name: Install Vulkan runtime (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-tools
      - name: Install Vulkan SDK + SwiftShader (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_swiftshader: true
          cache: true
          github_token: ${{ github.token }}
      - name: Setup SwiftShader (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path $sdkBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $sdkBin
          }
          $icdJson = "C:\SwiftShader\vk_swiftshader_icd.json"
          if (Test-Path $icdJson) {
            Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$icdJson"
          } else {
            $fallbackIcd = "$env:VULKAN_SDK\Bin\vk_swiftshader_icd.json"
            if (Test-Path $fallbackIcd) {
              Add-Content -Path $env:GITHUB_ENV -Value "VK_ICD_FILENAMES=$fallbackIcd"
            }
          }
      - name: Install Vulkan SDK + SwiftShader (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_VERSION }}
          install_lavapipe: true
          install_swiftshader: true
          cache: true
          github_token: ${{ github.token }}
      - name: Setup Vulkan environment (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        shell: bash
        run: bash .github/scripts/setup_vulkan_macos.sh
      - name: Download GPU native extension
        uses: actions/download-artifact@v8
        with:
          name: native-lib-php-gpu-${{ matrix.target }}-php${{ matrix.php-version }}
          path: target/release
      - name: Verify GPU extension
        shell: bash
        run: test -f target/release/${{ matrix.lib }}
      - name: Install PHP dependencies
        working-directory: crates/php-bindings-gpu
        run: composer install --no-interaction --prefer-dist
      - name: Run GPU PHP tests
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        working-directory: crates/php-bindings-gpu
        run: php -d extension=../../target/release/${{ matrix.lib }} vendor/bin/pest
      - name: Skip GPU PHP tests on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Write-Host "GPU PHP extension tests skipped on Windows."
          Write-Host "Rust nightly stdlibs are linked with a different MSVCRT version than PHP expects."
          Write-Host "This is a Rust toolchain issue, not a code issue. Rust code is tested on Linux/macOS."

  publish-cpu:
    name: Publish CPU to Packagist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [cpu-test]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Download all CPU native libraries
        uses: actions/download-artifact@v8
        with:
          pattern: native-lib-php-cpu-*
          path: crates/php-bindings/native
      - name: Stage native libraries
        run: |
          find crates/php-bindings/native -type f \( -name '*.so' -o -name '*.dll' -o -name '*.dylib' \) -exec mv {} crates/php-bindings/native/ \;
          find crates/php-bindings/native -mindepth 1 -type d -delete
          ls -la crates/php-bindings/native/
      - name: Create GitHub release with CPU binaries
        uses: softprops/action-gh-release@v3
        with:
          files: crates/php-bindings/native/*
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Packagist
        run: |
          curl -X POST "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}" \
            -H "Authorization: Bearer ${{ secrets.PACKAGIST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/${{ github.repository }}"}}'

  publish-gpu:
    name: Publish GPU to Packagist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [gpu-test]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Download all GPU native libraries
        uses: actions/download-artifact@v8
        with:
          pattern: native-lib-php-gpu-*
          path: crates/php-bindings-gpu/native
      - name: Stage GPU native libraries
        run: |
          find crates/php-bindings-gpu/native -type f \( -name '*.so' -o -name '*.dll' -o -name '*.dylib' \) -exec mv {} crates/php-bindings-gpu/native/ \;
          find crates/php-bindings-gpu/native -mindepth 1 -type d -delete
          ls -la crates/php-bindings-gpu/native/
      - name: Upload GPU binaries to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: crates/php-bindings-gpu/native/*
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Packagist GPU package
        run: |
          curl -X POST "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}" \
            -H "Authorization: Bearer ${{ secrets.PACKAGIST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/${{ github.repository }}"}}'
