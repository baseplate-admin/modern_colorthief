name: Check All

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-workspace:
    name: Check workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - name: Check all crates
        run: cargo check --workspace --all-targets --exclude modern-colorthief-ruby --exclude modern-colorthief-ruby-gpu --exclude modern-colorthief-php --exclude modern-colorthief-php-gpu
      - name: Check clippy
        continue-on-error: true
        run: cargo clippy --workspace --exclude modern-colorthief-ruby --exclude modern-colorthief-ruby-gpu --exclude modern-colorthief-php --exclude modern-colorthief-php-gpu -- -D warnings

  check-cross-platform:
    name: Cross-platform check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - wasm32-unknown-unknown
          - aarch64-linux-android
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - name: Check core crates
        run: cargo check --target ${{ matrix.target }} -p modern-colorthief-core -p modern-colorthief-core-cpu
      - name: Check Node bindings
        if: matrix.target != 'aarch64-linux-android'
        run: cargo check --target ${{ matrix.target }} -p modern-colorthief-node

  ruby-build:
    name: Ruby build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p modern-colorthief-ruby
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: test -f target/release/libmodern_colorthief.so
      - working-directory: crates/ruby-bindings
        run: |
          bundle install --path vendor/bundle
          RUBYLIB=../../target/release bundle exec rspec spec/

  ruby-gpu-build:
    name: Ruby GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p modern-colorthief-ruby-gpu
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: test -f target/release/libmodern_colorthief_gpu.so
      - working-directory: crates/ruby-bindings-gpu
        run: |
          bundle install --path vendor/bundle
          RUBYLIB=../../target/release bundle exec rspec spec/
