name: Node CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request
  workflow_dispatch

permissions:
  contents: read

jobs:
  node-test:
    name: Node.js test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/node-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build
        run: npm ci && npx napi build --platform --release
      - name: Test
        run: node examples/test.js || true

  deno-test:
    name: Deno test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/node-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build
        run: npm ci && npx napi build --platform --release
      - name: Test
        run: deno run --allow-read --allow-env examples/test.js || true

  bun-test:
    name: Bun test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/node-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build
        run: bun install && npx napi build --platform --release
      - name: Test
        run: bun examples/test.js || true

  publish-npm-node:
    name: Publish Node to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [node-test, deno-test, bun-test]
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: crates/node-bindings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Build wheels
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npx napi build --platform --release --target-dir=./artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: node-bindings
          path: crates/node-bindings/artifacts/*
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
