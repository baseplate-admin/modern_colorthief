name: Diagnostic Ruby Build

on:
  push:
    branches: [add-wasm]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev ruby-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and capture output
        id: build
        run: |
          OUTPUT=$(cargo build --release -p modern-colorthief-ruby 2>&1)
          RC=$?
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          echo "$OUTPUT" > /tmp/ruby.log
          echo "$OUTPUT"
        continue-on-error: true
      - name: Report error as annotations
        if: always()
        run: |
          echo "::error::Ruby build exit code: ${{ steps.build.outputs.exit_code }}"
          head -50 /tmp/ruby.log | while IFS= read -r line; do
            echo "::error title=Ruby build::$line"
          done
