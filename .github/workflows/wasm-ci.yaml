name: WASM CI

on:
  push:
    branches: [ main, master, wasm-fix ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-wasm -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - name: Run Rust core tests
        run: cargo test -p modern-colorthief-core -p modern-colorthief-core-cpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-core-wasm -p modern-colorthief-wasm -p modern-colorthief-wasm-gpu -p modern-colorthief-node-wasm
      - run: ls -lh target/wasm32-unknown-unknown/release/*.wasm

  cpu-chrome-tests:
    name: CPU Chrome tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: nanasess/setup-chromedriver@v3
      - uses: browser-actions/setup-geckodriver@latest
      - name: Run Chrome tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --headless --chrome --release --features browser-tests

  cpu-firefox-tests:
    name: CPU Firefox tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: nanasess/setup-chromedriver@v3
      - uses: browser-actions/setup-geckodriver@latest
      - name: Run Firefox tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --headless --firefox --release --features browser-tests

  gpu-node-tests:
    name: GPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-gpu-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install node-webgpu (Dawn) + deps
        working-directory: crates/wasm-bindings-gpu
        run: |
            npm --version
            npm install --ignore-scripts=false 2>&1 || true
            npm approve-scripts webgpu 2>/dev/null || true
            npm install --ignore-scripts=false 2>&1
      - name: Verify webgpu module loads
        working-directory: crates/wasm-bindings-gpu
        run: |
            node -e "import('webgpu').then(m => { const g = m.create([]); console.log('webgpu create:', g); console.log('gpu:', typeof g); process.exit(g ? 0 : 1); }).catch(e => { console.error('webgpu import failed:', e.message); process.exit(1); })"
      - name: Run GPU Node.js tests
        working-directory: crates/wasm-bindings-gpu
        run: wasm-pack test --node --release --features node-tests -- --no-capture

  cpu-node-tests:
    name: CPU Node.js tests
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run Node tests
        working-directory: crates/wasm-bindings
        run: wasm-pack test --node --release

  wasm-gpu-build:
    name: WASM GPU build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown -p modern-colorthief-core-wasm -p modern-colorthief-wasm-gpu
      - run: cargo build --target wasm32-unknown-unknown --release -p modern-colorthief-core-wasm -p modern-colorthief-wasm-gpu

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [cpu-chrome-tests, cpu-firefox-tests, cpu-node-tests, gpu-node-tests]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - working-directory: crates/wasm-bindings
        run: wasm-pack build --release
      - working-directory: crates/wasm-bindings
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - working-directory: crates/node-bindings-wasm
        run: wasm-pack build --release --target bundler
      - working-directory: crates/node-bindings-wasm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
